query GetLocationDetails($id: String!) {
  crmObjects(limit: 1, after: "", filter: {filters: [{propertyName: "hs_object_id", value: $id, operator: EQ}]}) {
    edges {
      node {
        hs_object_id
        properties {
          name
          location_id
          address
          campaign_start_date
          onboarding_status
          account_rep
          geofence_package
          geofence_package_status
          creative_package
          creative_package_status
          creative_links
          add_ons
        }
      }
    }
  }
}
